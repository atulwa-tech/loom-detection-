version: '3.8'

services:
  backend:
    build: .
    container_name: loom-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ESP32_URL=http://192.168.1.100:8080
      - DB_PATH=/app/data/loom.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: loom-network
